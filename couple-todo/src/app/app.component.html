<div class="dashboard-wrapper">
  <mat-card class="calendar-card">
    <mat-card-content style="height: 100%;">
      <full-calendar [options]="calendarOptions"></full-calendar>
    </mat-card-content>
  </mat-card>

  <mat-card class="todo-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>event_available</mat-icon> Today's Focus
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <app-todo></app-todo>
    </mat-card-content>
  </mat-card>
</div>
